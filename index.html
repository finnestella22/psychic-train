
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rag's Rags</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #fff;
      color: #111;
    }

    header {
      padding: 40px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    header h1 {
      margin: 0;
      font-size: 40px;
      letter-spacing: 2px;
    }

    header p {
      margin-top: 10px;
      color: #555;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      padding: 40px;
    }

    .product {
      text-align: center;
    }

    .product img {
      width: 100%;
      max-width: 300px;
      height: auto;
      border: 1px solid #eee;
    }

    .product p {
      margin-top: 10px;
      font-size: 14px;
    }

    .shop-link {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #ddd;
    }

    .shop-link a {
      text-decoration: none;
      color: black;
      font-weight: bold;
    }

    .shop-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<header>
  <h1>RAG'S RAGS</h1>
  <p>New York inspired hockey streetwear</p>
</header>

<section class="grid">

  <div class="product">
    <img src="images/shirt1.jpg" alt="Rangers Drop 01">
    <p>Rangers “Drop 01” Hoodie</p>
  </div>

  <div class="product">
    <img src="images/shirt2.jpg" alt="Knicks Hockey">
    <p>Knicks Hockey Sweater</p>
  </div>

  <div class="product">
    <img src="images/shirt3.jpg" alt="Vintage Rangers Tee">
    <p>Vintage Rangers Tee</p>
  </div>

</section>

<div class="shop-link">
  <a href="finnestella222@gmail.com">
    REQUEST ORDER / CONTACT
  </a>
</div>

</body>
</html>
