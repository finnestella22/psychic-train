<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rag's Rags</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* Background image layer */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("photo2.png") center/cover no-repeat;
      z-index: -2;
    }

    /* Navy overlay layer */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 80, 0.75); /* navy tint */
      z-index: -1;
    }

    /* Top left branding */
    .logo {
      position: absolute;
      top: 20px;
      left: 25px;
      font-size: 20px;
      letter-spacing: 2px;
      font-weight: bold;
    }

    /* Center content */
    .content {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .content h1 {
      font-size: 48px;
      margin-bottom: 10px;
      letter-spacing: 3px;
    }

    .content p {
      max-width: 500px;
      line-height: 1.5;
      color: #e6e6e6;
      font-size: 14px;
    }

    .email-btn {
      margin-top: 25px;
      padding: 12px 20px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      transition: 0.2s ease;
    }

    .email-btn:hover {
      background: white;
      color: navy;
    }

    .small-note {
      margin-top: 20px;
      font-size: 12px;
      color: #cfcfcf;
    }
  </style>
</head>

<body>

  <!-- Background -->
  <div class="bg"></div>
  <div class="overlay"></div>

  <!-- Branding -->
  <div class="logo">RAG'S RAGS</div>

  <!-- Main content -->
  <div class="content">
    <h1>RAG'S RAGS</h1>

    <p>
      New York inspired streetwear built on comfort colors blanks and
      Gildan hoodies. Custom hockey-inspired graphics, vintage sports
      references, and limited drops.
    </p>

    <a class="email-btn" href="mailto:yourname@gmail.com?subject=Rags%20Rags%20Order%20Request">
      CONTACT / ORDER REQUEST
    </a>

    <div class="small-note">
      Comfort Colors tees • Gildan hoodies • Custom requests available
    </div>
  </div>

</body>
</html>
