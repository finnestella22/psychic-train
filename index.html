*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body, #root { height: 100%; }

body {
  font-family: 'Readex Pro', system-ui, -apple-system, sans-serif;
  background: #000;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.hero-title {
  letter-spacing: -0.04em;
  line-height: 0.95;
}

/* ===== HERO ===== */
.hero {
  position: relative;
  height: 100vh;
  width: 100%;
  overflow: hidden;
  background: #000;
}

.hero-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  filter: brightness(0.75) saturate(0.8) hue-rotate(195deg) contrast(0.95);
}

.hero-blue-wash {
  position: absolute;
  inset: 0;
  background: rgba(5, 20, 80, 0.45);
  pointer-events: none;
}

.hero-mask {
  position: absolute;
  inset: 0;
  background: black;
  pointer-events: none;
  transition: background 0.05s;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ===== NAVBAR ===== */
nav {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 20;
  padding: 24px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(3, 25, 70, 0.85);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 9999px;
  padding: 10px 22px 10px 14px;
  border: 1px solid rgba(255,255,255,0.12);
}

.nav-shield {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}

.nav-logo-text {
  font-family: "NHL NY Rangers Outline", Arial, sans-serif;
  font-size: 13px;
  letter-spacing: 2.5px;
  color: #fff;
  white-space: nowrap;
}

.nav-center {
  display: none;
  align-items: center;
  gap: 2px;
  background: rgba(3, 25, 70, 0.85);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 9999px;
  padding: 6px 10px;
  border: 1px solid rgba(255,255,255,0.12);
}

@media (min-width: 768px) {
  .nav-center { display: flex; }
}

.nav-center a {
  color: rgba(180, 210, 255, 0.8);
  text-decoration: none;
  font-size: 13px;
  font-weight: 400;
  padding: 7px 18px;
  border-radius: 9999px;
  transition: color 0.2s;
  text-transform: lowercase;
  letter-spacing: 0.3px;
}

.nav-center a:hover { color: #fff; }

.nav-right {
  background: #fff;
  color: #031946;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border-radius: 9999px;
  padding: 11px 24px;
  text-decoration: none;
  transition: background 0.2s;
  white-space: nowrap;
}

.nav-right:hover { background: #d6e4ff; }

.hero-word {
  position: absolute;
  color: #fff;

  font-size: 16vw;
  text-transform: uppercase;
  text-shadow: 0 4px 40px rgba(0,0,0,0.5);
}

@media (min-width: 768px) {
  .hero-word { font-size: 13vw; }

  .word-1 { left: 2.5%; top: 18%; }

.hero-desc {
  position: absolute;
  left: 20px;
  top: 45%;
  max-width: 210px;
  font-size: 13px;
  line-height: 1.55;
  color: rgba(255,255,255,0.80);
  font-weight: 300;
  letter-spacing: 0.2px;
}

@media (min-width: 768px) {
  .hero-desc { left: 2.5%; max-width: 240px; font-size: 14px; }
}

.hero-gradient {
  pointer-events: none;
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 220px;
  background: linear-gradient(to bottom, transparent, #000);
}

/* ===== STAT BLOCKS ===== */
.stat { position: absolute; }

.stat-top-right {
  top: 13%;
  right: 20px;
  text-align: right;
}

.stat-bottom-left {
  bottom: 72px;
  left: 20px;
}
