/* Photo + blue wash clipped to cursor circle */

  position: absolute;
  inset: 0;
  z-index: 1;
  clip-path: circle(0px at -999px -999px);
  transition: clip-path 0.12s ease-out;
}

.hero-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  filter: brightness(0.7) saturate(0.75) hue-rotate(200deg) contrast(0.9);
}

.hero-blue-wash {
  position: absolute;
  inset: 0;
  background: rgba(5, 20, 90, 0.4);
}

.hero-gradient {
  pointer-events: none;
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 240px;
  background: linear-gradient(to bottom, transparent, #000);
  z-index: 2;
